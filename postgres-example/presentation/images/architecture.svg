<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 580" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7a"/>
    </marker>
    <style>
      .box{rx:10;ry:10;stroke:#cdd6df;stroke-width:1.5;}
      .t{fill:#1f2933;font-size:17px;font-weight:600;}
      .s{fill:#52606d;font-size:13px;}
      .h{fill:#7b8794;font-size:12px;font-weight:700;letter-spacing:1px;}
      .l{stroke:#5b6b7a;stroke-width:2;fill:none;}
    </style>
  </defs>

  <rect x="0" y="0" width="1040" height="580" fill="#f7f9fb"/>
  <text x="40" y="44" class="t" font-size="24">Dekart architecture</text>
  <text x="40" y="70" class="s">One Go container · Kepler.gl frontend · SQL connectors · MCP for agents</text>

  <!-- Clients -->
  <text x="40" y="118" class="h">CLIENTS</text>
  <rect class="box" x="40" y="130" width="220" height="80" fill="#eef4ff"/>
  <text x="60" y="162" class="t">Browser</text>
  <text x="60" y="186" class="s">Kepler.gl map UI</text>

  <rect class="box" x="40" y="230" width="220" height="80" fill="#eef4ff"/>
  <text x="60" y="262" class="t">AI Agents</text>
  <text x="60" y="286" class="s">Claude / Codex via MCP</text>

  <!-- Dekart core -->
  <text x="400" y="118" class="h">DEKART</text>
  <rect class="box" x="360" y="130" width="300" height="320" fill="#ffffff" stroke="#9aa5b1" stroke-width="2"/>
  <text x="380" y="166" class="t" font-size="20">Dekart server (Go)</text>
  <rect class="box" x="384" y="186" width="252" height="46" fill="#f0f4f8"/>
  <text x="400" y="214" class="s">gRPC-web API · static Kepler.gl</text>
  <rect class="box" x="384" y="244" width="252" height="46" fill="#f0f4f8"/>
  <text x="400" y="272" class="s">MCP: /api/v1/mcp/tools · /call</text>
  <rect class="box" x="384" y="302" width="252" height="46" fill="#f0f4f8"/>
  <text x="400" y="330" class="s">Metadata: SQLite (or Postgres)</text>
  <rect class="box" x="384" y="360" width="252" height="64" fill="#f0f4f8"/>
  <text x="400" y="386" class="s">Query results → object storage</text>
  <text x="400" y="406" class="s">S3 / GCS / MinIO / replay</text>

  <!-- Data sources -->
  <text x="800" y="118" class="h">DATA SOURCES</text>
  <rect class="box" x="760" y="130" width="240" height="190" fill="#eefaf1"/>
  <text x="780" y="160" class="t">Warehouses</text>
  <text x="780" y="186" class="s">Postgres · BigQuery</text>
  <text x="780" y="208" class="s">Snowflake · Athena</text>
  <text x="780" y="230" class="s">Clickhouse · Wherobots</text>
  <text x="780" y="262" class="s">Uploads: CSV · GeoJSON</text>
  <text x="780" y="284" class="s">Parquet</text>

  <!-- Storage -->
  <text x="800" y="360" class="h">RESULT STORAGE</text>
  <rect class="box" x="760" y="372" width="240" height="78" fill="#fff6e9"/>
  <text x="780" y="404" class="t">Object store</text>
  <text x="780" y="428" class="s">S3 · GCS · MinIO (local)</text>

  <!-- arrows -->
  <path class="l" d="M260,170 L355,210" marker-end="url(#arrow)"/>
  <path class="l" d="M260,270 L355,300" marker-end="url(#arrow)"/>
  <path class="l" d="M660,225 L755,225" marker-end="url(#arrow)"/>
  <path class="l" d="M660,400 L755,410" marker-end="url(#arrow)"/>

  <text x="40" y="520" class="s">Browser/agents talk to Dekart; Dekart runs SQL on your warehouse, writes results to object storage, and renders them as Kepler.gl layers.</text>
</svg>
